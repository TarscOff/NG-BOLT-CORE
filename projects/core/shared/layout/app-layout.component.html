<mat-sidenav-container class="app-container">
  @if (showSidenav()) {
    <mat-sidenav #sidenav mode="side" [(opened)]="isOpen" class="side-nav" [fixedInViewport]="true">
      <div class="nav-title">
        <a routerLink="/" role="link">
          <img [src]="logoUrl" alt="Logo" class="logo" />
          {{ 'navigationTitle' | translate }}
        </a>
      </div>

      <mat-nav-list class="menu-list">
        @for (item of menuItems; track item.route) {
          <a
            mat-list-item
            class="menu-link"
            [routerLink]="item.route"
            routerLinkActive="active"
            [matTooltip]="(item.label | translate) ?? ''"
            matTooltipPosition="below"
          >
            <mat-icon [color]="'primary'">{{ item.icon }}</mat-icon>
            <span class="menu-label">{{ item.label | translate }}</span>
          </a>
        }
      </mat-nav-list>

      <!-- USER PANEL -->
      @if (profile$ | async; as p) {
        <div class="user-panel" [class.collapsed]="!isOpen">
          <button
            mat-button
            class="user-trigger primary"
            [matMenuTriggerFor]="userMenu"
            [attr.aria-label]="displayName(p)"
            [color]="'primary'"
          >
            <mat-icon class="avatar" [color]="'primary'">account_circle</mat-icon>
            @if (isOpen) {
              <div class="user-meta">
                <div class="user-name">{{ displayName(p) }}</div>
                <div class="user-email">{{ p.email }}</div>
              </div>
            }
          </button>

          <mat-menu #userMenu="matMenu">
            @for (r of (roles$ | async) ?? []; track r) {
              <p mat-menu-item>{{ r }}</p>
            }
            <button mat-menu-item (click)="logout()" class="primary">
              <mat-icon>logout</mat-icon>
              <span>{{ 'Logout' | translate }}</span>
            </button>
          </mat-menu>
        </div>
      }

      <div class="version-wrapper">
        <small class="version">v{{ version }}</small>
      </div>
    </mat-sidenav>
  }

  <mat-sidenav-content>
    <app-header
      [showMenuButton]="showSidenav()"
      [logoData]="(logoData$ | async) ?? null"
      [title]="(title$ | async) ?? ''"
      [breadcrumbItems]="breadcrumbItems$ | async"
      [scrolled]="isScrolled"
      [navLinks]="headerNavLinks()"
      (menuToggle)="toggleSidenav()"
    >
    </app-header>

    <main class="app-content" #sidenavContent>
      <router-outlet />
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
